<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFood - Sesión de Mesa</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .container { text-align: center; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: white; }
        .input-group { margin-bottom: 1rem; }
        input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; background-color: #007bff; color: white; margin: 0.2rem; }
        button:hover { background-color: #0056b3; }
        #sessionInfo { margin-top: 1.5rem; font-size: 1.2rem; }
        #status { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sesión de Mesa</h1>
        <div id="initialView">
            <div class="input-group">
                <label for="qrIdInput">ID del QR de la Mesa:</label><br>
                <input type="text" id="qrIdInput" placeholder="Ej: 1a2b3c4d">
            </div>
            <button onclick="handleOpenSession()">Abrir Sesión</button>
        </div>

        <div id="sessionView" style="display: none;">
            <div id="sessionInfo">
                <p>Mesa: <strong id="tableNumber"></strong></p>
                <p>Tiempo restante: <strong id="countdown"></strong></p>
            </div>
            <button onclick="closeByPayment()">Pagar y Cerrar Sesión</button>
        </div>
        
        <p id="status"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
